name: Build NootedGreen

on:
  workflow_dispatch:

jobs:
  build-nootedgreen:
    runs-on: macos-latest
    
    steps:
      - name: Checkout NootedGreen
        uses: actions/checkout@v4
        with:
          repository: sgiammori/NootedGreen
          path: NootedGreen
          fetch-depth: 1

      - name: Build NootedGreen
        working-directory: ./NootedGreen
        run: |
          xcodebuild -project NootedGreen.xcodeproj -scheme NootedGreen -configuration Release build 2>&1 | tail -30

      - name: Build HookCase
        working-directory: ./NootedGreen/HookCase-master
        run: |
          xcodebuild -project HookCase.xcodeproj -scheme HookCase -configuration Release build 2>&1 | tail -30

      - name: Create output directory
        run: mkdir -p output/kexts

      - name: Debug build output
        run: |
          echo "=== NootedGreen build dir ==="
          find NootedGreen -name "*.kext" -type d 2>/dev/null
          ls -la NootedGreen/build/Release/ 2>/dev/null || echo "No Release dir"
          
          echo "=== HookCase build dir ==="
          find NootedGreen/HookCase-master -name "*.kext" -type d 2>/dev/null
          ls -la NootedGreen/HookCase-master/build/Release/ 2>/dev/null || echo "No Release dir"

      - name: Copy NootedGreen.kext
        run: |
          mkdir -p output/kexts
          if [ -d "NootedGreen/build/Release/NootedGreen.kext" ]; then
            cp -R NootedGreen/build/Release/NootedGreen.kext output/kexts/
          else
            # Try alternative locations
            cp -R $(find NootedGreen -name "NootedGreen.kext" -type d 2>/dev/null | head -1) output/kexts/ 2>/dev/null || true
          fi

      - name: Copy HookCase.kext
        run: |
          if [ -d "NootedGreen/HookCase-master/build/Release/HookCase.kext" ]; then
            cp -R NootedGreen/HookCase-master/build/Release/HookCase.kext output/kexts/
          else
            cp -R $(find NootedGreen/HookCase-master -name "HookCase.kext" -type d 2>/dev/null | head -1) output/kexts/ 2>/dev/null || true
          fi

      - name: List output
        run: |
          ls -la output/kexts/
          du -sh output/kexts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NootedGreen-kexts
          path: output/kexts/
          retention-days: 1