name: Build NootedGreen

on:
  workflow_dispatch:

jobs:
  build-nootedgreen:
    runs-on: macos-latest
    
    steps:
      - name: Checkout NootedGreen
        uses: actions/checkout@v4
        with:
          repository: sgiammori/NootedGreen
          path: NootedGreen
          fetch-depth: 1

      - name: Build NootedGreen
        working-directory: ./NootedGreen
        run: |
          xcodebuild -project NootedGreen.xcodeproj -scheme NootedGreen -configuration Release -derivedDataPath ./DerivedData build 2>&1 | tail -30
          ls -la DerivedData/Build/Products/Release/ 2>/dev/null || echo "Checking alternative..."
          find DerivedData -name "*.kext" -type d 2>/dev/null | head -5

      - name: Build HookCase
        working-directory: ./NootedGreen/HookCase-master
        run: |
          xcodebuild -project HookCase.xcodeproj -scheme HookCase -configuration Release -derivedDataPath ./DerivedData build 2>&1 | tail -30
          find DerivedData -name "*.kext" -type d 2>/dev/null | head -5

      - name: Create output directory
        run: mkdir -p output/kexts

      - name: Debug build output
        run: |
          echo "=== NootedGreen build dir ==="
          find NootedGreen -name "*.kext" -type d 2>/dev/null
          ls -la NootedGreen/build/Release/ 2>/dev/null || echo "No Release dir"
          
          echo "=== HookCase build dir ==="
          find NootedGreen/HookCase-master -name "*.kext" -type d 2>/dev/null
          ls -la NootedGreen/HookCase-master/build/Release/ 2>/dev/null || echo "No Release dir"

      - name: Copy NootedGreen.kext
        run: |
          mkdir -p output/kexts
          # Check DerivedData location
          NG_DIR=$(find NootedGreen/DerivedData -name "NootedGreen.kext" -type d 2>/dev/null | head -1)
          if [ -n "$NG_DIR" ]; then
            cp -R "$NG_DIR" output/kexts/
            echo "Copied NootedGreen.kext from DerivedData"
          else
            # Try alternative
            NG_DIR=$(find NootedGreen -name "NootedGreen.kext" -type d 2>/dev/null | head -1)
            if [ -n "$NG_DIR" ]; then
              cp -R "$NG_DIR" output/kexts/
              echo "Copied NootedGreen.kext"
            fi
          fi

      - name: Copy HookCase.kext
        run: |
          HC_DIR=$(find NootedGreen/HookCase-master/DerivedData -name "HookCase.kext" -type d 2>/dev/null | head -1)
          if [ -n "$HC_DIR" ]; then
            cp -R "$HC_DIR" output/kexts/
            echo "Copied HookCase.kext from DerivedData"
          fi

      - name: Create dummy file to ensure output exists
        run: |
          mkdir -p output/kexts
          echo "Build completed at $(date)" > output/kexts/build-info.txt
          echo "Listing NootedGreen build directory:" > output/kexts/build-info.txt
          find NootedGreen/build -name "*.kext" -type d >> output/kexts/build-info.txt 2>/dev/null || echo "No kexts found in build" >> output/kexts/build-info.txt
          cat output/kexts/build-info.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NootedGreen-Build-Artifacts
          path: output/
          retention-days: 1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NootedGreen-kexts
          path: output/kexts/
          retention-days: 1